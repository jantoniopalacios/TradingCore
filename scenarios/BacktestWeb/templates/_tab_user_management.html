<div class="p-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h5 class="mb-0 text-white"><i class="bi bi-people-fill me-2"></i>Gestión de Usuarios</h5>
        <span class="badge bg-info text-dark">Solo Admin</span>
    </div>

    <div class="card bg-dark border-secondary mb-4">
        <div class="card-header border-secondary text-white fw-semibold">Crear nuevo usuario</div>
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-5">
                    <label class="form-label text-light small">Usuario</label>
                    <input id="newUserName" type="text" class="form-control" placeholder="nuevo_usuario">
                </div>
                <div class="col-md-5">
                    <label class="form-label text-light small">Contraseña</label>
                    <input id="newUserPassword" type="password" class="form-control" placeholder="********">
                </div>
                <div class="col-md-2 d-grid">
                    <button type="button" class="btn btn-primary" onclick="adminCreateUser()">
                        <i class="bi bi-person-plus me-1"></i> Crear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card bg-dark border-secondary">
        <div class="card-header border-secondary text-white fw-semibold">Usuarios existentes</div>
        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover mb-0 align-middle">
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Usuario</th>
                        <th style="width: 260px;">Nueva contraseña</th>
                        <th style="width: 260px;" class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for usr in usuarios_gestion %}
                    <tr>
                        <td>{{ usr.id }}</td>
                        <td>
                            <input id="username-{{ usr.id }}" type="text" class="form-control form-control-sm" value="{{ usr.username }}" {% if usr.username|lower == 'admin' %}readonly{% endif %}>
                        </td>
                        <td>
                            <input id="password-{{ usr.id }}" type="password" class="form-control form-control-sm" placeholder="Dejar vacío para mantener">
                        </td>
                        <td class="text-end">
                            <button type="button" class="btn btn-sm btn-success" onclick="adminUpdateUser({{ usr.id }})">
                                <i class="bi bi-save me-1"></i> Guardar
                            </button>
                            <button type="button" class="btn btn-sm btn-danger" onclick="adminDeleteUser({{ usr.id }}, '{{ usr.username }}')" {% if usr.username|lower == 'admin' %}disabled{% endif %}>
                                <i class="bi bi-trash me-1"></i> Borrar
                            </button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-3">No hay usuarios registrados.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function adminPostForm(url, payload) {
    const form = document.getElementById('formDelete');
    if (!form) {
        window.location.href = url;
        return;
    }

    form.action = url;
    form.innerHTML = '';

    Object.entries(payload || {}).forEach(([key, value]) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = value == null ? '' : String(value);
        form.appendChild(input);
    });

    form.submit();
}

function adminCreateUser() {
    const username = (document.getElementById('newUserName')?.value || '').trim();
    const password = (document.getElementById('newUserPassword')?.value || '').trim();
    if (!username || !password) {
        alert('Usuario y contraseña son obligatorios.');
        return;
    }
    adminPostForm("{{ url_for('main.admin_users_create') }}", { username, password });
}

function adminUpdateUser(userId) {
    const username = (document.getElementById(`username-${userId}`)?.value || '').trim();
    const password = (document.getElementById(`password-${userId}`)?.value || '').trim();
    if (!username) {
        alert('El nombre de usuario no puede estar vacío.');
        return;
    }
    adminPostForm(`/admin/users/update/${userId}`, { username, password });
}

function adminDeleteUser(userId, username) {
    if (!confirm(`¿Seguro que quieres eliminar al usuario '${username}'?`)) {
        return;
    }
    adminPostForm(`/admin/users/delete/${userId}`, {});
}
</script>
